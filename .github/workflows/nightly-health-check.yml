name: Nightly Health Check

on:
  schedule:
      - cron: '0 5 * * *'  # midnight Central Time (UTC-5)
        workflow_dispatch:      # allows manual trigger from GitHub

        jobs:
          health-check:
              runs-on: ubuntu-latest
                  steps:
                        - name: Check frontend loads
                                run: |
                                          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://haulflow.turtlelogisticsllc.com/)
                                                    echo "Frontend status: $STATUS"
                                                              if [ "$STATUS" != "200" ]; then echo "FAIL: Frontend returned $STATUS"; exit 1; fi

                                                                    - name: Check admin login API
                                                                            run: |
                                                                                      STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST https://haulflow.turtlelogisticsllc.com/api/auth/login \
                                                                                                  -H "Content-Type: application/json" \
                                                                                                              -d '{"email":"healthcheck@test.com","password":"badpassword"}')
                                                                                                                        echo "Login API status: $STATUS"
                                                                                                                                  if [ "$STATUS" != "200" ] && [ "$STATUS" != "401" ] && [ "$STATUS" != "400" ]; then
                                                                                                                                              echo "FAIL: Login API returned unexpected status $STATUS"; exit 1
                                                                                                                                                        fi

                                                                                                                                                              - name: Check driver auth API
                                                                                                                                                                      run: |
                                                                                                                                                                                STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST https://haulflow.turtlelogisticsllc.com/api/auth/driver-login \
                                                                                                                                                                                            -H "Content-Type: application/json" \
                                                                                                                                                                                                        -d '{"phone":"0000000000","password":"badpassword"}')
                                                                                                                                                                                                                  echo "Driver auth status: $STATUS"
                                                                                                                                                                                                                            if [ "$STATUS" != "200" ] && [ "$STATUS" != "401" ] && [ "$STATUS" != "400" ]; then
                                                                                                                                                                                                                                        echo "FAIL: Driver auth API returned unexpected status $STATUS"; exit 1
                                                                                                                                                                                                                                                  fi

                                                                                                                                                                                                                                                        - name: Check demo endpoint
                                                                                                                                                                                                                                                                run: |
                                                                                                                                                                                                                                                                          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://haulflow.turtlelogisticsllc.com/demo)
                                                                                                                                                                                                                                                                                    echo "Demo page status: $STATUS"
                                                                                                                                                                                                                                                                                              if [ "$STATUS" != "200" ]; then echo "FAIL: Demo page returned $STATUS"; exit 1; fi

                                                                                                                                                                                                                                                                                                    - name: Check Railway backend is alive
                                                                                                                                                                                                                                                                                                            run: |
                                                                                                                                                                                                                                                                                                                      STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://haulflow.turtlelogisticsllc.com/api/auth/login \
                                                                                                                                                                                                                                                                                                                                  -H "Content-Type: application/json" \
                                                                                                                                                                                                                                                                                                                                              -d '{"email":"ping@healthcheck.com","password":"ping"}')
                                                                                                                                                                                                                                                                                                                                                        echo "Railway backend status: $STATUS"
                                                                                                                                                                                                                                                                                                                                                                  if [ "$STATUS" = "000" ] || [ "$STATUS" = "502" ] || [ "$STATUS" = "503" ] || [ "$STATUS" = "504" ]; then
                                                                                                                                                                                                                                                                                                                                                                              echo "FAIL: Railway backend is down ($STATUS)"; exit 1
                                                                                                                                                                                                                                                                                                                                                                                        fi

                                                                                                                                                                                                                                                                                                                                                                                              - name: Send failure email
                                                                                                                                                                                                                                                                                                                                                                                                      if: failure()
                                                                                                                                                                                                                                                                                                                                                                                                              uses: dawidd6/action-send-mail@v3
                                                                                                                                                                                                                                                                                                                                                                                                                      with:
                                                                                                                                                                                                                                                                                                                                                                                                                                server_address: smtp.gmail.com
                                                                                                                                                                                                                                                                                                                                                                                                                                          server_port: 465
                                                                                                                                                                                                                                                                                                                                                                                                                                                    username: ${{ secrets.ALERT_EMAIL_USER }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                              password: ${{ secrets.ALERT_EMAIL_PASS }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        subject: "🚨 HaulFlow Health Check FAILED - ${{ github.run_id }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  to: kevin@go4fc.com
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            from: HaulFlow Monitor
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      body: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  One or more HaulFlow health checks failed at midnight.

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              Check the full details here:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          https://github.com/kevanaenterprises-bot/haulflow/actions/runs/${{ github.run_id }}

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      What was tested:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  - Frontend (haulflow.turtlelogisticsllc.com)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              - Admin login API
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          - Driver auth API
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      - Demo page
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  - Railway backend connectivity

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              Fix it before your customers notice!

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    - name: All checks passed
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            if: success()
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    run: echo "✅ All HaulFlow health checks passed at $(date)"